rce": "零样本学习（Zero-shot Learning）", "target": "zero-shot 泛化的架构"}, {"source": "零样本学习（Zero-shot Learning）", "target": "visual-perception"}, {"source": "零样本学习（Zero-shot Learning）", "target": "动态权重"}, {"source": "零样本学习（Zero-shot Learning）", "target": "基于搜索的规划器"}, {"source": "零样本学习（Zero-shot Learning）", "target": "基于采样的规划器"}, {"source": "非盲降噪", "target": "信息冗余"}, {"source": "非盲降噪", "target": "PSNR"}, {"source": "非盲降噪", "target": "高斯噪声假设下的最大似然估计"}, {"source": "非盲降噪", "target": "感知图像质量（LPIPS）"}, {"source": "非盲降噪", "target": "病态问题（Ill-posed）"}, {"source": "非盲降噪", "target": "FFDNet"}, {"source": "非线性激活函数", "target": "ReLU"}, {"source": "非线性激活函数", "target": "梯度消失"}, {"source": "非线性激活函数", "target": "Transformer"}, {"source": "非线性激活函数", "target": "前馈神经网络"}, {"source": "非线性激活函数", "target": "全局感受野"}, {"source": "非线性激活函数", "target": "VGGT"}, {"source": "非线性激活函数", "target": "MV-SAM3D"}, {"source": "高斯噪声假设下的最大似然估计", "target": "信息冗余"}, {"source": "高斯噪声假设下的最大似然估计", "target": "PSNR"}, {"source": "高斯噪声假设下的最大似然估计", "target": "感知图像质量（LPIPS）"}, {"source": "高斯噪声假设下的最大似然估计", "target": "病态问题（Ill-posed）"}, {"source": "高斯噪声假设下的最大似然估计", "target": "FFDNet"}, {"source": "高斯噪声假设下的最大似然估计", "target": "中值滤波（Median Filtering）"}, {"source": "高维动作空间", "target": "RL训练"}, {"source": "高维动作空间", "target": "耦合冲突"}, {"source": "高维动作空间", "target": "隐空间先验"}, {"source": "鲁棒性", "target": "动态权重"}, {"source": "鲁棒性", "target": "基于搜索的规划器"}, {"source": "鲁棒性", "target": "基于采样的规划器"}, {"source": "鲁棒性", "target": "基于优化的规划器"}, {"source": "鲁棒性", "target": "基于价值地图的规划器"}, {"source": "鲁棒性", "target": "instruction-following 的泛化能力"}, {"source": "鲁棒性", "target": "零样本学习（Zero-shot Learning）"}, {"source": "鲁棒性", "target": "reward信号"}]};

const W=window.innerWidth, H=window.innerHeight;
const c=document.getElementById('c'), ctx=c.getContext('2d');
c.width=W*devicePixelRatio;c.height=H*devicePixelRatio;
c.style.width=W+'px';c.style.height=H+'px';
ctx.scale(devicePixelRatio,devicePixelRatio);

const nodes=DATA.nodes.map((n,i)=>({...n,x:W/2+(Math.random()-.5)*W*.8,y:H/2+(Math.random()-.5)*H*.8,vx:0,vy:0}));
const nMap={};nodes.forEach(n=>nMap[n.id]=n);
const links=DATA.links.filter(l=>nMap[l.source]&&nMap[l.target]).map(l=>({source:nMap[l.source],target:nMap[l.target]}));

// Legend
const cats=[...new Set(nodes.map(n=>n.group))];
cats.forEach(cat=>{
  const color=nodes.find(n=>n.group===cat).color;
  document.getElementById('legend').innerHTML+=`<div class="leg"><span style="background:${color}"></span>${cat}</div>`;
});

let highlighted=null;
window.search=function(q){
  highlighted=null;
  if(q.length>0){
    const ql=q.toLowerCase();
    const found=nodes.find(n=>n.id.toLowerCase().includes(ql));
    if(found) highlighted=found.id;
  }
};

function tick(){
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y;
      const d=Math.max(1,Math.sqrt(dx*dx+dy*dy));
      const f=200/(d*d);
      nodes[i].vx+=dx/d*f;nodes[i].vy+=dy/d*f;
      nodes[j].vx-=dx/d*f;nodes[j].vy-=dy/d*f;
    }
  }
  links.forEach(l=>{
    const dx=l.target.x-l.source.x,dy=l.target.y-l.source.y;
    const d=Math.max(1,Math.sqrt(dx*dx+dy*dy));
    const f=0.015*(d-50);
    l.source.vx+=dx/d*f;l.source.vy+=dy/d*f;
    l.target.vx-=dx/d*f;l.target.vy-=dy/d*f;
  });
  nodes.forEach(n=>{
    n.x+=n.vx*0.4;n.y+=n.vy*0.4;
    n.vx*=0.80;n.vy*=0.80;
    n.x=Math.max(20,Math.min(W-20,n.x));
    n.y=Math.max(20,Math.min(H-20,n.y));
  });
}

function hexToRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function draw(){
  ctx.clearRect(0,0,W,H);
  links.forEach(l=>{
    const a=highlighted?(l.source.id===highlighted||l.target.id===highlighted?0.5:0.02):0.12;
    ctx.beginPath();ctx.moveTo(l.source.x,l.source.y);ctx.lineTo(l.target.x,l.target.y);
    ctx.strokeStyle=`rgba(139,148,158,${a})`;ctx.lineWidth=0.4;ctx.stroke();
  });
  nodes.forEach(n=>{
    const a=highlighted&&n.id!==highlighted?0.15:1;
    const r=highlighted&&n.id===highlighted?8:3.5;
    ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);
    ctx.fillStyle=hexToRgba(n.color,a);
    ctx.fill();
    if(a>0.7&&(!highlighted||highlighted===n.id)&&nodes.length<300){
      ctx.fillStyle=`rgba(230,237,243,${a*0.8})`;
      ctx.font='6px -apple-system,sans-serif';
      const label=n.id.length>10?n.id.slice(0,9)+'…':n.id;
      ctx.fillText(label,n.x+5,n.y+2);
    }
  });
}

// Mouse interaction
let dragging=null,ox=0,oy=0,moved=false;
c.addEventListener('mousedown',e=>{
  const mx=e.clientX,my=e.clientY;
  const found=nodes.find(n=>Math.hypot(n.x-mx,n.y-my)<12);
  if(found){dragging=found;ox=found.x-mx;oy=found.y-my;moved=false;}
});
c.addEventListener('mousemove',e=>{
  if(dragging){dragging.x=e.clientX+ox;dragging.y=e.clientY+oy;moved=true;return;}
  const mx=e.clientX,my=e.clientY;
  const found=nodes.find(n=>Math.hypot(n.x-mx,n.y-my)<12);
  const tip=document.getElementById('tip');
  if(found){tip.style.display='block';tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-28)+'px';tip.textContent=found.id+' · '+found.group;c.style.cursor='grab';}
  else{tip.style.display='none';c.style.cursor='default';}
  if(!dragging&&e.buttons===1){nodes.forEach(n=>{n.x+=e.movementX;n.y+=e.movementY;});}
});
c.addEventListener('mouseup',()=>{dragging=null;});
c.addEventListener('wheel',e=>{
  e.preventDefault();
  const s=e.deltaY>0?0.92:1.08;
  const cx=W/2,cy=H/2;
  nodes.forEach(n=>{n.x=cx+(n.x-cx)*s;n.y=cy+(n.y-cy)*s;});
});

// Touch support
c.addEventListener('touchstart',e=>{
  const t=e.touches[0];
  const found=nodes.find(n=>Math.hypot(n.x-t.clientX,n.y-t.clientY)<20);
  if(found){dragging=found;ox=found.x-t.clientX;oy=found.y-t.clientY;}
  e.preventDefault();
},{passive:false});
c.addEventListener('touchmove',e=>{
  if(dragging){dragging.x=e.touches[0].clientX+ox;dragging.y=e.touches[0].clientY+oy;}
  e.preventDefault();
},{passive:false});
c.addEventListener('touchend',()=>{dragging=null;});

// Animation loop
setInterval(()=>{for(let i=0;i<3;i++)tick();draw();},25);
</script>
